spring:
  application:
    name: gabon-next
  threads:
    virtual:
      enabled: true          # 验收④②：钱核走虚拟线程
  flyway:
    enabled: true            # Boot 4 需 spring-boot-starter-flyway 才会启动时自动迁移
    locations: classpath:db/migration
wallet:
  exchange-rate: 100         # 验收①：@ConfigurationProperties 构造器绑定
  currency: CNY
---
# 生产配置契约(spec §2.3 连接拓扑):runtime=gabon_app,迁移走 owner;
# owner 必须与 codegen/测试一致(V4 alter default privileges 的生效前提)。
# 任一 GABON_DB_* env 缺失 → 占位符原样透传 → datasource 初始化失败 → 启动失败(fail fast);
# 失败消息不点名 env(Boot 非严格解析),排查先核对 GABON_DB_* 四件套(见 ProdProfileContractTest)。
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${GABON_DB_URL}      # owner/app 同库;flyway 未配 url 时沿用此 url、仅换凭据(Boot 行为)
    username: gabon_app
    password: ${GABON_DB_APP_PASSWORD}
  flyway:
    user: ${GABON_DB_OWNER_USER}
    password: ${GABON_DB_OWNER_PASSWORD}
